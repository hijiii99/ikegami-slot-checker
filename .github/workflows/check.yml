name: 池上教習所 空き枠チェック

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-slots:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 空き枠をチェックして通知
        env:
          ELICENSE_LOGIN_ID:          ${{ secrets.ELICENSE_LOGIN_ID }}
          ELICENSE_PASSWORD:          ${{ secrets.ELICENSE_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN:  ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID:               ${{ secrets.LINE_USER_ID }}
        run: python check_slots.py
